server {
    listen 80;
    server_name tsunami.souss-massa.ma;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name tsunami.souss-massa.ma;

    ssl_certificate      /etc/ssl/certs/tsunami_souss_massa.crt;
    ssl_certificate_key  /etc/ssl/private/tsunami_souss_massa.key;
    ssl_protocols TLSv1.3;
    ssl_ciphers   TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://tile.openstreetmap.org" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(self)" always;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=alert_limit:10m rate=5r/s;
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1s;
        proxy_read_timeout    1s;
    }
    location /api/siren/ {
        limit_req zone=alert_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }
}